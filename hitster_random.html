<html lang="es"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hitster Bingo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background-color: #1a1a1a;

        #instruction {

        }

        #challenge-display {
            position: absolute;
            left: 50%;
            top: 48%;
            transform: translate(-50%, -50%);
            display: none;
            flex-direction: column;
            align-items: center;

            gap: 16px;
            text-align: center;

        }

        #challenge-display.active {

        }

        #challenge-image {
            width: min(56vw, 350px);
            max-height: min(70vw, 260px);

            /* box-shadow: 0 10px 26px rgba(0, 0, 0, 0.35);
            background: rgba(255, 255, 255, 0.18); */
        }

        #challenge-text {
            margin: 0;
            font-size: clamp(1.1rem, 3vw, 2rem);
            font-weight: 900;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            text-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
        }

        #mini-challenge-display {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 8px 12px;
            /* border-radius: 14px; */
            /* background: rgba(0, 0, 0, 0.28); */
            max-width: 100%;
        }

        #mini-challenge-display.active {
            display: flex;
        }

        #mini-challenge-image {
            width: 70px;
            height: 50px;
            object-fit: contain;
            border-radius: 10px;

        }

        #mini-challenge-text {
            margin: 0;
            font-size: clamp(0.75rem, 2vw, 1rem);

            text-transform: uppercase;

        }

        #top-controls {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            pointer-events: auto;
        }


        #disco-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0;
            z-index: 12;
            transition: opacity 0.2s ease;
            background:
                radial-gradient(circle at 12% 18%, rgba(255, 255, 255, 1) 0 3px, transparent 4px),
                radial-gradient(circle at 26% 76%, rgba(255, 255, 255, 0.9) 0 3px, transparent 4px),
                radial-gradient(circle at 78% 16%, rgba(255, 255, 255, 0.92) 0 3px, transparent 4px),
                radial-gradient(circle at 86% 74%, rgba(255, 255, 255, 1) 0 3px, transparent 4px),
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.5) 0 2px, transparent 3px),
                radial-gradient(circle at 40% 30%, rgba(255, 255, 255, 0.72) 0 2px, transparent 3px),
                radial-gradient(circle at 62% 68%, rgba(255, 255, 255, 0.68) 0 2px, transparent 3px);
            mix-blend-mode: screen;
            filter: blur(0.25px) brightness(1.2) saturate(1.4);
        }

        #disco-overlay.active {
            opacity: 1;
            animation: discoPulse 0.42s linear infinite;
        }

        #disco-overlay::before,
        #disco-overlay::after {
            content: '';
            position: absolute;
            inset: -25%;
            background:
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.18) 0 8px, transparent 9px),
                radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.15) 0 4px, transparent 5px),
                radial-gradient(circle at 65% 68%, rgba(255, 255, 255, 0.12) 0 6px, transparent 7px);
            background-size: 120px 120px, 160px 160px, 180px 180px;
            opacity: 0.85;
        }

        #disco-overlay::before {
            animation: discoDrift 0.95s linear infinite;
        }

        #disco-overlay::after {
            animation: discoDriftReverse 1.15s linear infinite;
            opacity: 0.85;
            transform: scale(1.08);
        }

        @keyframes discoPulse {
            0%, 100% {
                transform: scale(1);
                filter: brightness(1.05) saturate(1.2);
            }

            20% {
                transform: scale(1.01);
                filter: brightness(1.5) saturate(1.8);
            }

            50% {
                transform: scale(1.02);
                filter: brightness(2) saturate(2.2);
            }

            80% {
                transform: scale(1.01);
                filter: brightness(1.65) saturate(1.9);
            }
        }

        @keyframes discoDrift {
            from {
                transform: translate3d(-3%, -2%, 0) rotate(0deg);
            }

            to {
                transform: translate3d(3%, 2%, 0) rotate(540deg);
            }
        }

        @keyframes discoDriftReverse {
            from {
                transform: translate3d(3%, 2%, 0) rotate(0deg) scale(1.08);
            }

            to {
                transform: translate3d(-3%, -2%, 0) rotate(-540deg) scale(1.08);
            }
        }

        #new-game-btn {
            border: 0;
            border-radius: 999px;
            padding: 10px 18px;
            font-weight: 800;
            letter-spacing: 0.04em;

        body.active #instruction {

        #history-bar {
            position: absolute;

            left: 50%;

        #history-bar::-webkit-scrollbar {

        }

        .modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            display: flex;
            justify-content: center;

        .modal-overlay.hidden {

        .modal-box {

        .modal-section {

        .modal-section-title {

        .modal-actions button {

        }

        .btn-primary {

        .mode-choice-btn {

        .mode-choice-btn.selected {

        }

        .choice-normal {
            background: #1e9f4d;
        }

        .choice-hard {

        }

        .choice-without-cards {

        }

        .choice-with-cards {
            background: #2f7dcf;
        }

        .mode-choice-btn:hover {
            transform: translateY(-1px);
            box-shadow: none;
        }

        #confirm-game-choices {
            min-width: 210px;
            min-height: 54px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-radius: 999px;
            border: 0;
            box-shadow: none;
        }

        #confirm-game-choices:disabled {
            background: #5a5a5a;
            color: rgba(255, 255, 255, 0.7);
            cursor: not-allowed;
            box-shadow: none;
        }

        #cancel-game-choices {
            min-width: 210px;
            min-height: 54px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 900;
            border-radius: 999px;
            border: 0;
            box-shadow: none;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: rgba(255, 255, 255, 0.2);

        }

        #cancel-game-choices:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .history-dot {

        }

        @keyframes popIn {

        @media (max-width: 600px) {

        }
    </style>
</head>

<body class="active" style="background-color: rgb(153, 51, 255);">

    <div id="difficulty-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="difficulty-title">
        <div class="modal-box">
            <p id="difficulty-title">Choisissez le mode de la nouvelle partie</p>
            <div class="modal-section">
                <p class="modal-section-title">Mode</p>
                <div class="mode-actions">
                    <button id="mode-normal" class="mode-choice-btn choice-normal" type="button">Normal</button>
                    <button id="mode-hard" class="mode-choice-btn choice-hard" type="button">Difficile</button>
                </div>
            </div>
            <div class="modal-section">
                <p class="modal-section-title">Affichage des cartes</p>
                <div class="mode-actions">
                    <button id="cards-without" class="mode-choice-btn choice-without-cards" type="button">Sans cartes</button>
                    <button id="cards-with" class="mode-choice-btn choice-with-cards" type="button">Avec cartes</button>

                <button id="confirm-game-choices" class="btn-primary" type="button" disabled>Valider</button>
            </div>

    </div>

    <script>
        const colors = ['#ff3333', '#9933FF', '#52c952', '#e7e74e', '#3399FF'];
        const bar = document.getElementById('history-bar');
        const text = document.getElementById('instruction');
        const challengeDisplay = document.getElementById('challenge-display');
        const challengeImage = document.getElementById('challenge-image');
        const challengeText = document.getElementById('challenge-text');
        const miniChallengeDisplay = document.getElementById('mini-challenge-display');
        const miniChallengeImage = document.getElementById('mini-challenge-image');
        const miniChallengeText = document.getElementById('mini-challenge-text');
        const newGameBtn = document.getElementById('new-game-btn');
        const difficultyModal = document.getElementById('difficulty-modal');
        const modeNormalBtn = document.getElementById('mode-normal');
        const modeHardBtn = document.getElementById('mode-hard');
        const cardsWithoutBtn = document.getElementById('cards-without');
        const cardsWithBtn = document.getElementById('cards-with');
        const cancelGameChoicesBtn = document.getElementById('cancel-game-choices');
        const confirmGameChoicesBtn = document.getElementById('confirm-game-choices');
        const discoOverlay = document.getElementById('disco-overlay');

        let started = false;
        let currentMode = 'normal';
        let optionsMode = 'without-cards';
        let currentRoundColor = null;
        let shuffledCards = [];
        let cardCursor = 0;
        let cardStep = 0;
        let transitionTimerIds = [];
        let isTransitionRunning = false;
        let discoOffTimerId = null;
        let selectedModeChoice = null;
        let selectedCardsChoice = null;
        let lastSevenDrawnColors = [];
        let colorTimeSinceDrawn = { '#ff3333': 0, '#9933FF': 0, '#52c952': 0, '#e7e74e': 0, '#3399FF': 0 };

        const imageBase = './img/';
        const colorKeyByHex = {
            '#52c952': 'green',
            '#ff3333': 'red',
            '#e7e74e': 'yellow',
            '#9933ff': 'violet',
            '#3399ff': 'blue'
        };

        const modeRules = {
            normal: {
                green: { text: 'Artiste solo ou groupe/duo', image: 'solo ou duo_groupe.jpg' },
                red: { text: 'Avant 2000 ?', image: 'avant_ou_apres_2000_v2.jpg' },
                yellow: { text: 'A 4 ans près', image: 'a_4_années_pres.jpg' },
                violet: { text: 'Décennie', image: 'decade.jpg' },
                blue: { text: 'A 2 ans près', image: 'a_2_annees_pres.jpg' }
            },
            hard: {
                green: { text: 'Titre de la chanson', image: 'titre.jpg' },
                red: { text: 'Année exacte', image: 'anneee_exacte_2.jpg' },
                yellow: { text: 'Nom du groupe ou du chanteur', image: 'nom_du_groupe_ou_chanteur.jpg' },
                violet: { text: 'Décennie', image: 'decade.jpg' },
                blue: { text: 'A 3 ans près', image: 'a_3_années_pres.jpg' }
            }
        };

        function shuffleCards() {
            const values = [];

            for (let i = 1; i <= 308; i += 1) {
                values.push({ number: i, variant: '' });
                values.push({ number: i, variant: '_summer' });
            }

            for (let i = values.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [values[i], values[j]] = [values[j], values[i]];
            }
            return values;
        }

        function getCurrentCard() {
            if (cardCursor >= shuffledCards.length) {
                shuffledCards = shuffleCards();
                cardCursor = 0;
            }
            return shuffledCards[cardCursor];
        }

        function startNewGame(mode, cardsMode) {
            currentMode = mode;
            optionsMode = cardsMode;
            resetGameState(mode);
        }

        function updateGameChoiceButtons() {
            modeNormalBtn.classList.toggle('selected', selectedModeChoice === 'normal');
            modeHardBtn.classList.toggle('selected', selectedModeChoice === 'hard');
            cardsWithoutBtn.classList.toggle('selected', selectedCardsChoice === 'without-cards');
            cardsWithBtn.classList.toggle('selected', selectedCardsChoice === 'with-cards');

            confirmGameChoicesBtn.disabled = !(selectedModeChoice && selectedCardsChoice);
        }

        function resetGameChoiceSelection() {
            selectedModeChoice = null;
            selectedCardsChoice = null;
            updateGameChoiceButtons();
        }

        function getRuleForColor(color) {
            const colorKey = colorKeyByHex[color.toLowerCase()];
            return modeRules[currentMode]?.[colorKey];
        }

        function hideMiniChallenge() {
            miniChallengeDisplay.classList.remove('active');
            miniChallengeImage.src = '';
            miniChallengeText.innerText = '';
        }

        function hideCentralChallenge() {
            challengeDisplay.classList.remove('active');
            challengeImage.src = '';
            challengeText.innerText = '';
            challengeText.style.display = 'block';
            text.style.display = 'block';
            hideMiniChallenge();
        }

        function showMiniChallenge(color) {
            const rule = getRuleForColor(color);
            if (!rule) {
                hideMiniChallenge();
                return;
            }

            miniChallengeImage.src = encodeURI(imageBase + rule.image);
            miniChallengeText.innerText = rule.text;
            miniChallengeDisplay.classList.add('active');
        }

        function updateChallengeDisplay(color) {
            const rule = getRuleForColor(color);
            if (!rule) {
                challengeDisplay.classList.remove('active');
                return;
            }

            challengeText.innerText = rule.text;
            challengeText.style.display = 'block';
            challengeImage.src = encodeURI(imageBase + rule.image);
            challengeDisplay.classList.add('active');
            text.style.display = 'none';
            hideMiniChallenge();
        }

        function isModalOpen() {
            return !difficultyModal.classList.contains('hidden');
        }

        function openModal(modal) {
            modal.classList.remove('hidden');
        }

        function closeModal(modal) {
            modal.classList.add('hidden');
        }

        function resetGameState(mode) {
            currentMode = mode;
            started = false;
            currentRoundColor = null;
            cardStep = 0;
            cardCursor = 0;
            lastSevenDrawnColors = [];
            colorTimeSinceDrawn = { '#ff3333': 0, '#9933FF': 0, '#52c952': 0, '#e7e74e': 0, '#3399FF': 0 };
            shuffledCards = shuffleCards();
            transitionTimerIds.forEach((timerId) => clearTimeout(timerId));
            transitionTimerIds = [];
            isTransitionRunning = false;
            if (discoOffTimerId) {
                clearTimeout(discoOffTimerId);
                discoOffTimerId = null;
            }
            discoOverlay.classList.remove('active');
            bar.innerHTML = '';
            document.body.classList.remove('active');
            document.body.style.backgroundColor = '#1a1a1a';
            text.innerText = "HITSTER BINGO";
            text.style.display = 'block';
            hideCentralChallenge();
        }

        newGameBtn.addEventListener('click', (event) => {
            event.stopPropagation();
            resetGameChoiceSelection();
            openModal(difficultyModal);
        });

        modeNormalBtn.addEventListener('click', (event) => {
            event.stopPropagation();
            selectedModeChoice = 'normal';
            updateGameChoiceButtons();
        });

        modeHardBtn.addEventListener('click', (event) => {
            event.stopPropagation();
            selectedModeChoice = 'hard';
            updateGameChoiceButtons();
        });

        cardsWithoutBtn.addEventListener('click', (event) => {
            event.stopPropagation();
            selectedCardsChoice = 'without-cards';
            updateGameChoiceButtons();
        });

        cardsWithBtn.addEventListener('click', (event) => {
            event.stopPropagation();
            selectedCardsChoice = 'with-cards';
            updateGameChoiceButtons();
        });

        cancelGameChoicesBtn.addEventListener('click', (event) => {
            event.stopPropagation();
            closeModal(difficultyModal);
        });

        confirmGameChoicesBtn.addEventListener('click', (event) => {
            event.stopPropagation();
            if (!(selectedModeChoice && selectedCardsChoice)) {
                return;
            }
            closeModal(difficultyModal);
            startNewGame(selectedModeChoice, selectedCardsChoice);
        });

        difficultyModal.addEventListener('click', (event) => {
            event.stopPropagation();
        });

        function getConstrainedColor() {
            // Incrémenter les compteurs de temps pour toutes les couleurs non récemment tirées
            colors.forEach((c) => {
                if (lastSevenDrawnColors.indexOf(c) === -1) {
                    colorTimeSinceDrawn[c] += 1;
                }
            });

            // Fonction helper : compter les occurrences d'une couleur dans les 7 derniers tirages
            const countColorInHistory = (color) => {
                return lastSevenDrawnColors.filter(c => c === color).length;
            };

            // Chercher s'il y a une couleur non tirée depuis 7+ tirages
            const maxTime = Math.max(...colors.map(c => colorTimeSinceDrawn[c]));
            if (maxTime >= 7) {
                // Prioriser les couleurs longtemps non tirées, éviter 3 d'affilée ET 2+ en 7 tirages
                const candidates = colors.filter(
                    (c) => colorTimeSinceDrawn[c] === maxTime && 
                           countColorInHistory(c) < 2 &&
                           !(lastSevenDrawnColors.length >= 2 && lastSevenDrawnColors[lastSevenDrawnColors.length - 1] === lastSevenDrawnColors[lastSevenDrawnColors.length - 2] && lastSevenDrawnColors[lastSevenDrawnColors.length - 1] === c)
                );
                const selected = candidates.length > 0 ? candidates[Math.floor(Math.random() * candidates.length)] : colors[Math.floor(Math.random() * colors.length)];
                lastSevenDrawnColors.push(selected);
                if (lastSevenDrawnColors.length > 7) lastSevenDrawnColors.shift();
                colorTimeSinceDrawn[selected] = 0;
                return selected;
            }

            // Sinon, tirage aléatoire avec contraintes : évite 3 d'affilée ET 2+ en 7 tirages
            let candidate;
            let attempts = 0;
            do {
                candidate = colors[Math.floor(Math.random() * colors.length)];
                attempts += 1;
            } while (
                attempts < 20 &&
                (countColorInHistory(candidate) >= 2 ||
                (lastSevenDrawnColors.length >= 2 &&
                lastSevenDrawnColors[lastSevenDrawnColors.length - 1] === lastSevenDrawnColors[lastSevenDrawnColors.length - 2] &&
                lastSevenDrawnColors[lastSevenDrawnColors.length - 1] === candidate))
            );

            // Updater l'historique et reset du compteur
            lastSevenDrawnColors.push(candidate);
            if (lastSevenDrawnColors.length > 7) lastSevenDrawnColors.shift();
            colorTimeSinceDrawn[candidate] = 0;

            return candidate;
        }

        function renderChallengeForColor(color) {
            document.body.style.backgroundColor = color;

            if (!started) {
                started = true;
                document.body.classList.add('active');
                text.innerText = 'HITSTER BINGO';
            }

            updateChallengeDisplay(color);

            const dot = document.createElement('div');
            dot.className = 'history-dot';
            dot.style.backgroundColor = color;
            bar.append(dot);

            while (bar.children.length > 9) {
                bar.removeChild(bar.firstElementChild);
            }
        }

        function renderCardImage(face) {
            const card = getCurrentCard();
            const suffix = face === 'recto' ? 'recto' : 'verso';
            challengeImage.src = encodeURI(`./hitster_cards_transparent/${card.number}_${suffix}${card.variant}.png`);
            challengeText.style.display = 'none';
            challengeDisplay.classList.add('active');
            text.style.display = 'none';

            if (currentRoundColor) {
                showMiniChallenge(currentRoundColor);
            }

            if (face === 'verso') {
                cardCursor += 1;
            }
        }

        function runColorTransition(finalColor, onComplete) {
            if (isTransitionRunning) {
                return;
            }

            isTransitionRunning = true;
            discoOverlay.classList.add('active');
            hideCentralChallenge();
            transitionTimerIds.forEach((timerId) => clearTimeout(timerId));
            transitionTimerIds = [];

            if (discoOffTimerId) {
                clearTimeout(discoOffTimerId);
                discoOffTimerId = null;
            }

            const palette = colors.slice();
            const cycleColors = [];

            for (let repeat = 0; repeat < 2; repeat += 1) {
                cycleColors.push(...palette);
            }

            if (cycleColors[cycleColors.length - 1] === finalColor) {
                cycleColors.push(palette[(palette.indexOf(finalColor) + 1) % palette.length]);
            }

            cycleColors.push(finalColor);

            document.body.style.backgroundColor = '#1a1a1a';

            cycleColors.forEach((color, index) => {
                const timerId = setTimeout(() => {
                    document.body.style.backgroundColor = color;

                    if (index === cycleColors.length - 1) {
                        isTransitionRunning = false;
                        discoOffTimerId = setTimeout(() => {
                            discoOverlay.classList.remove('active');
                            discoOffTimerId = null;
                        }, 180);
                        onComplete();
                    }
                }, 90 * (index + 1));

                transitionTimerIds.push(timerId);
            });
        }

        document.body.onclick = () => {
            if (isModalOpen()) {
                return;
            }

            if (isTransitionRunning) {
                return;
            }

            if (optionsMode === 'with-cards') {
                if (cardStep === 0) {
                    const color = getConstrainedColor();
                    currentRoundColor = color;
                    runColorTransition(color, () => {
                        renderChallengeForColor(color);
                        cardStep = 1;
                    });
                    return;
                }

                if (cardStep === 1) {
                    if (currentRoundColor) {
                        document.body.style.backgroundColor = currentRoundColor;
                    }
                    renderCardImage('recto');
                    cardStep = 2;
                    return;
                }

                if (currentRoundColor) {
                    document.body.style.backgroundColor = currentRoundColor;
                }
                renderCardImage('verso');
                cardStep = 0;
                return;
            }

            const color = getConstrainedColor();

            runColorTransition(color, () => {
                renderChallengeForColor(color);
            });
        };

        resetGameState(currentMode);
    </script>
