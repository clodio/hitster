<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hitster Bingo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .card {
            background: #2a2a2a;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 100%;
            border: 3px solid #ff00ff;
            position: relative;
        }

        .board-selector {
            position: absolute;
            top: 10px;
            left: 12px;
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid #ff00ff;
            background: rgba(255, 0, 255, 0.2);
            user-select: none;
        }

        .board-selector:hover {
            background: rgba(255, 0, 255, 0.35);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 25px;
        }

        .cell {
            aspect-ratio: 1;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #000;
        }

        .cell:hover {
            transform: scale(0.95);
            opacity: 0.9;
        }

        .cell.marked::before,
        .cell.marked::after {
            content: '';
            position: absolute;
            width: 80%;
            height: 4px;
            background: #000;
            border-radius: 2px;
        }

        .cell.marked::before {
            transform: rotate(45deg);
        }

        .cell.marked::after {
            transform: rotate(-45deg);
        }

        .yellow {
            background: linear-gradient(135deg, #e7e74e, #fdd835);
        }

        .green {
            background: linear-gradient(135deg, #52c952, #4caf50);
        }

        .blue {
            background: linear-gradient(135deg, #3399ff, #2196f3);
        }

        .pink {
            background: linear-gradient(135deg, #ff3333, #ec407a);
        }

        .purple {
            background: linear-gradient(135deg, #9933ff, #9c27b0);
        }

        .title {
            text-align: center;
            color: #ff00ff;
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 3px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }

        .text-area {
            width: 100%;
            background: white;
            border: none;
            border-radius: 10px;
            padding: 20px;
            font-size: 24px;
            text-align: center;
            margin-bottom: 15px;
            resize: none;
            font-family: 'Arial', sans-serif;
            min-height: 80px;
        }

        .text-area:focus {
            outline: 2px solid #ff00ff;
        }

        .button {
            width: 100%;
            background: linear-gradient(135deg, #ff00ff, #ff1493);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 0, 255, 0.5);
        }

        .button:active {
            transform: translateY(0);
        }

        .board-picker-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .board-picker {
            background: #1f1f1f;
            border: 2px solid #ff00ff;
            border-radius: 12px;
            padding: 20px;
            width: min(360px, 100%);
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.55);
        }

        .board-picker-title {
            color: #ff00ff;
            text-align: center;
            margin-bottom: 14px;
            font-size: 20px;
            font-weight: bold;
        }

        .board-options {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .board-option {
            border: 1px solid #ff00ff;
            border-radius: 8px;
            background: #2a2a2a;
            color: #ffffff;
            padding: 10px 0;
            cursor: pointer;
            font-weight: bold;
        }

        .board-option:hover {
            background: #3a3a3a;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="board-selector" id="boardSelector">#1</div>
        <div class="grid" id="grid"></div>
        <div class="title">HITSTER</div>
        <textarea class="text-area" id="textArea" placeholder="Write here..."></textarea>
        <button class="button" onclick="clearText()">Clear text</button>
    </div>

    <div class="board-picker-overlay" id="boardPickerOverlay">
        <div class="board-picker">
            <div class="board-picker-title">Choisir un plateau</div>
            <div class="board-options" id="boardOptions"></div>
        </div>
    </div>

    <script>
        const COLOR_POOL = ['yellow', 'green', 'blue', 'pink', 'purple'];
        const BOARD_SIZE = 5;
        const BOARD_COUNT = 10;
        const MAX_PER_COLOR_PER_LINE = 2;
        const TARGET_PER_COLOR = (BOARD_SIZE * BOARD_SIZE) / COLOR_POOL.length;

        if (!Number.isInteger(TARGET_PER_COLOR)) {
            throw new Error('La taille du plateau doit permettre une repartition egale des couleurs');
        }

        const grid = document.getElementById('grid');
        const boardSelector = document.getElementById('boardSelector');
        const boardPickerOverlay = document.getElementById('boardPickerOverlay');
        const boardOptions = document.getElementById('boardOptions');
        const textArea = document.getElementById('textArea');

        function shuffle(array) {
            const result = [...array];
            for (let i = result.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [result[i], result[j]] = [result[j], result[i]];
            }
            return result;
        }

        function buildBoard() {
            const board = Array.from({ length: BOARD_SIZE }, () => Array(BOARD_SIZE).fill(null));
            const rowCounts = Array.from({ length: BOARD_SIZE }, () => ({}));
            const colCounts = Array.from({ length: BOARD_SIZE }, () => ({}));
            const totalCounts = Object.fromEntries(COLOR_POOL.map((color) => [color, 0]));

            function canPlace(row, col, color) {
                const rowCount = rowCounts[row][color] || 0;
                const colCount = colCounts[col][color] || 0;
                const totalCount = totalCounts[color] || 0;
                return rowCount < MAX_PER_COLOR_PER_LINE
                    && colCount < MAX_PER_COLOR_PER_LINE
                    && totalCount < TARGET_PER_COLOR;
            }

            function place(row, col, color) {
                board[row][col] = color;
                rowCounts[row][color] = (rowCounts[row][color] || 0) + 1;
                colCounts[col][color] = (colCounts[col][color] || 0) + 1;
                totalCounts[color] += 1;
            }

            function unplace(row, col, color) {
                board[row][col] = null;
                rowCounts[row][color] -= 1;
                colCounts[col][color] -= 1;
                totalCounts[color] -= 1;
            }

            function backtrack(position) {
                if (position === BOARD_SIZE * BOARD_SIZE) {
                    return true;
                }

                const row = Math.floor(position / BOARD_SIZE);
                const col = position % BOARD_SIZE;
                const candidateColors = shuffle(COLOR_POOL);

                for (const color of candidateColors) {
                    if (!canPlace(row, col, color)) {
                        continue;
                    }

                    place(row, col, color);
                    if (backtrack(position + 1)) {
                        return true;
                    }
                    unplace(row, col, color);
                }

                return false;
            }

            const success = backtrack(0);
            if (!success) {
                throw new Error('Impossible de generer un plateau valide');
            }

            return board.flat();
        }

        function buildBoards() {
            const boards = [];
            for (let i = 0; i < BOARD_COUNT; i += 1) {
                boards.push(buildBoard());
            }
            return boards;
        }

        const boards = buildBoards();
        let currentBoardIndex = 0;

        function renderBoard(boardIndex) {
            const colors = boards[boardIndex];
            grid.innerHTML = '';

            colors.forEach((color) => {
                const cell = document.createElement('div');
                cell.className = `cell ${color}`;
                cell.onclick = function () {
                    this.classList.toggle('marked');
                };
                grid.appendChild(cell);
            });

            currentBoardIndex = boardIndex;
            boardSelector.textContent = `#${currentBoardIndex + 1}`;
        }

        function openBoardPicker() {
            boardPickerOverlay.style.display = 'flex';
        }

        function closeBoardPicker() {
            boardPickerOverlay.style.display = 'none';
        }

        function initBoardOptions() {
            for (let i = 0; i < BOARD_COUNT; i += 1) {
                const option = document.createElement('button');
                option.type = 'button';
                option.className = 'board-option';
                option.textContent = `#${i + 1}`;
                option.onclick = () => {
                    renderBoard(i);
                    closeBoardPicker();
                };
                boardOptions.appendChild(option);
            }
        }

        boardSelector.onclick = openBoardPicker;
        boardPickerOverlay.onclick = function (event) {
            if (event.target === boardPickerOverlay) {
                closeBoardPicker();
            }
        };

        textArea.onclick = function () {
            this.select();
        };

        initBoardOptions();
        renderBoard(currentBoardIndex);

        function clearText() {
            textArea.value = '';
        }
    </script>
</body>

</html>
